services:

  # ── Web Application (code mounted as volume) ──────────────
  app_build:
    image: node:18-slim
    container_name: hms_app_build
    restart: "no"
    working_dir: /app
    volumes:
      - ./:/app                   # volume for code instead of Dockerfile
    ports:
      - "5001:5000"               # different port from Part 1
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo_build:27017/hospital_management
      - JWT_SECRET=ci_test_secret
      - JWT_EXPIRE=7d
    command: sh -c "npm install && node server.js"
    depends_on:
      - mongo_build
    networks:
      - hms_build_network

  # ── MongoDB (for build only) ──────────────────────────────
  mongo_build:
    image: mongo:7.0
    container_name: hms_mongo_build
    restart: "no"
    ports:
      - "27018:27017"             # different port from Part 1
    environment:
      - MONGO_INITDB_DATABASE=hospital_management
    volumes:
      - mongo_build_data:/data/db
    networks:
      - hms_build_network

volumes:
  mongo_build_data:
    driver: local
    name: hms_mongo_build_data

networks:
  hms_build_network:
    driver: bridge
    name: hms_build_network