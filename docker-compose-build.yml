services:
  app_build:
    image: node:18-slim
    container_name: hms_app_build
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app                 
    ports:
      - "5001:5000"              
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo_build:27017/hospital_management
      - JWT_SECRET=change_this_secret_in_production
      - JWT_EXPIRE=7d
    command: sh -c "npm install && node server.js"
    depends_on:
      - mongo_build
    networks:
      - hms_build_network

  mongo_build:
    image: mongo:7.0
    container_name: hms_mongo_build
    restart: unless-stopped
    ports:
      - "27018:27017"            
    environment:
      - MONGO_INITDB_DATABASE=hospital_management
    volumes:
      - mongo_build_data:/data/db
      - mongo_build_config:/data/configdb
    networks:
      - hms_build_network

volumes:
  mongo_build_data:
    driver: local
    name: hms_mongo_build_data
  mongo_build_config:
    driver: local
    name: hms_mongo_build_config

networks:
  hms_build_network:
    driver: bridge
    name: hms_build_network